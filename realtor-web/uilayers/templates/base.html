<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Propertism Realty Advisors{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/premium-styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "components/_header.html" %}
    
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
    
    {% include "components/_footer.html" %}
    
    <script src="{% static 'js/theme-switcher.js' %}"></script>
    <script src="{% static 'js/utils.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
