<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - Chennai Realtor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/dist/assets/properties.css">
</head>
<body>
    <div id="react-properties-app" data-api-url="/api/properties/"></div>
    
    <script src="/static/dist/assets/properties.js"></script>
    <script>
        if (window.PropertiesApp) {
            window.PropertiesApp.mount(
                document.getElementById('react-properties-app')
            );
        } else {
            console.error('PropertiesApp not found. Make sure properties.js is loaded correctly.');
        }
    </script>
</body>
</html>
