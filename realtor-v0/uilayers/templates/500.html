<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Propertism Realty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --navy: #0F172A;
            --gold: #B89A4A;
            --white: #FFFFFF;
            --text-secondary: #64748B;
            --border-color: #E2E8F0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--white);
            color: var(--navy);
            line-height: 1.6;
        }
        
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--navy);
        }
        
        .error-message {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            border-radius: 0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .btn-primary {
            background: var(--gold);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background: transparent;
            border-color: var(--gold);
            color: var(--gold);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--navy);
            color: var(--navy);
        }
        
        .btn-secondary:hover {
            background: var(--navy);
            color: var(--white);
        }
        
        .error-help {
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .error-help a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }
        
        .error-help a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .error-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">500</div>
            <h1>Server Error</h1>
            <p class="error-message">
                We're sorry, but something went wrong on our end. Our team has been notified and is working to fix the issue.
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">Go to Homepage</a>
                <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
            </div>
            <div class="error-help">
                <p>If the problem persists, please contact us at <a href="tel:+918667020798">+91 86670 20798</a></p>
                <p style="margin-top: 0.5rem;">or email <a href="mailto:info@propertism.com">info@propertism.com</a></p>
            </div>
        </div>
    </div>
</body>
</html>
